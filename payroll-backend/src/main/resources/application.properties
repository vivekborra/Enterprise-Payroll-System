# ==========================================
# SERVER CONFIG
# ==========================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api/v1

# ==========================================
# DATABASE CONFIG
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/payroll_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ==========================================
# JPA / HIBERNATE CONFIG
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# JWT CONFIG
# ==========================================
app.jwt.secret=${JWT_SECRET:changeme_long_secret_key_here}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ==========================================
# MAIL CONFIG
# ==========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@payroll.com}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==========================================
# APP CONFIG
# ==========================================
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.company.name=${COMPANY_NAME:TechCorp India Pvt. Ltd.}
app.company.cin=${COMPANY_CIN:U72900KA2024PTC123456}

# ==========================================
# LOGGING
# ==========================================
logging.level.com.payroll=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/payroll-app.log
logging.file.max-size=10MB
logging.file.max-history=30

# ==========================================
# SPRINGDOC / SWAGGER
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ==========================================
# MULTIPART
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
